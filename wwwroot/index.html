<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="/style.css?v=20260428-blue-motion">
</head>
<body>

<div class="page-backdrop">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>
    <div class="motion-layer" aria-hidden="true">
        <span class="ribbon ribbon-one"></span>
        <span class="ribbon ribbon-two"></span>
        <span class="float-token token-one"></span>
        <span class="float-token token-two"></span>
        <span class="float-token token-three"></span>
        <span class="spark spark-one"></span>
        <span class="spark spark-two"></span>
        <span class="spark spark-three"></span>
    </div>

    <div class="container">
        <div class="card">
            <p class="eyebrow">Live Exchange Rates</p>
            <h1>Currency Converter</h1>

            <div class="field-stack">
                <label for="amount">Amount</label>
                <input type="number" id="amount" placeholder="Enter amount" min="0.01" step="0.01" />
            </div>

            <div class="select-group">
                <div class="select-card">
                    <label for="from">From</label>
                    <select id="from"></select>
                </div>

                <button
                    type="button"
                    class="swap"
                    onclick="convert()"
                    aria-label="Convert currency"
                    title="Convert currency"
                >
                    &#8646;
                </button>

                <div class="select-card">
                    <label for="to">To</label>
                    <select id="to"></select>
                </div>
            </div>

            <button type="button" class="convert-btn" onclick="convert()">Convert Currency</button>

            <div class="result-box">
                <span class="result-label">Converted amount</span>
                <h3 id="result" aria-live="polite">0.00</h3>
            </div>
        </div>
    </div>

    <footer class="page-footer">Built by Manlangit - Ca&ntilde;ete - Tompong</footer>
</div>

<script>
const apiBase = "/api/currency";

async function fetchJson(url) {
    const response = await fetch(url);

    if (!response.ok) {
        const message = await response.text();
        throw new Error(message || "Request failed.");
    }

    return response.json();
}

function populateCurrencySelect(select, currencies) {
    select.innerHTML = "";

    currencies.forEach(({ code, name }) => {
        const option = document.createElement("option");
        option.value = code;
        option.textContent = `${name} (${code})`;
        select.appendChild(option);
    });
}

async function loadCurrencies() {
    const from = document.getElementById("from");
    const to = document.getElementById("to");
    const result = document.getElementById("result");

    try {
        const currencies = await fetchJson(`${apiBase}/currencies`);

        populateCurrencySelect(from, currencies);
        populateCurrencySelect(to, currencies);

        from.value = "USD";
        to.value = "PHP";
    } catch (error) {
        result.innerText = error.message;
    }
}

async function convert() {
    const amount = document.getElementById("amount").value;
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;
    const result = document.getElementById("result");

    if (!amount || Number(amount) <= 0) {
        result.innerText = "Enter an amount greater than zero.";
        return;
    }

    try {
        const data = await fetchJson(
            `${apiBase}/convert?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}&amount=${encodeURIComponent(amount)}`
        );

        result.innerText =
            `${Number(amount).toLocaleString()} ${from} = ${Number(data.result).toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            })} ${to}`;
    } catch (error) {
        result.innerText = error.message;
    }
}

loadCurrencies();
</script>

</body>
</html>
